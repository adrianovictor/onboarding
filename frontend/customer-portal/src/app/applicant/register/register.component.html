<app-navbar />

<div class="register-header">
  <h1>Abertura de conta corrente</h1>
  <p>Preencha os dados abaixo — leva menos de 5 minutos</p>
</div>

<div class="register-body">
  <div class="register-inner">
    <app-stepper [steps]="steps" [currentStep]="currentStep()" />

    @switch (currentStep()) {
      @case (0) { <app-personal-data (next)="next()" /> }
      @case (1) { <app-address      (next)="next()" (back)="back()" /> }
      @case (2) { <app-financial-info (next)="next()" (back)="back()" /> }
      @case (3) { <app-documents    (next)="next()" (back)="back()" /> }
      @case (4) { <app-confirmation (submit)="submit()" (back)="back()" /> }
    }
  </div>
</div>

<app-footer />
