<div class="form-card">
  <p class="form-title">Documento de identificação</p>
  <div class="doc-grid">
    <div class="upload-area" (click)="frontInput.click()"
         [class.uploaded]="frontFile">
      <input #frontInput type="file" accept="image/*,.pdf"
             (change)="onFront($event)" hidden>
      @if (frontFile) {
        <span class="upload-check">✓</span>
        <p class="upload-name">{{ frontFile.name }}</p>
      } @else {
        <span class="upload-icon">📤</span>
        <p>Clique para enviar</p>
        <p class="upload-hint">Frente do RG ou CNH</p>
      }
    </div>

    <div class="upload-area" (click)="backInput.click()"
         [class.uploaded]="backFile">
      <input #backInput type="file" accept="image/*,.pdf"
             (change)="onBack($event)" hidden>
      @if (backFile) {
        <span class="upload-check">✓</span>
        <p class="upload-name">{{ backFile.name }}</p>
      } @else {
        <span class="upload-icon">📤</span>
        <p>Clique para enviar</p>
        <p class="upload-hint">Verso do RG ou CNH</p>
      }
    </div>
  </div>
</div>

<div class="form-actions">
  <span class="step-info">Passo 4 de 5</span>
  <div class="actions-right">
    <button class="btn-back" (click)="back.emit()">← Voltar</button>
    <button class="btn-next" (click)="continue()"
            [disabled]="!frontFile || !backFile">
      Continuar →
    </button>
  </div>
</div>
